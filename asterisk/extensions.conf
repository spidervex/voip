[from-internal]
exten => 200,1,NoOp(Incoming call to AI)
 same => n,Answer()
 same => n,Stasis(ai-assistant)
 same => n,Hangup()

exten => 300,1,NoOp(Playing Test AI File)
 same => n,Answer()
 ; Replace /data/audio/test_speech with YOUR actual full path
 ; Note: Do NOT include the .wav extension in the Playback command
 same => n,Playback(/data/audio/test_speech)
 same => n,Hangup()


 ; --- 9000: Replay the latest news ---
 exten => 9000,1,NoOp(Replaying latest daily news)
  same => n,Answer()
  same => n,Wait(1)
  same => n,Playback(/data/audio/daily_news)
  same => n,Hangup()

 ; --- 9001: Trigger a fresh news generation ---
 exten => 9001,1,NoOp(Triggering fresh AI News Generation)
  same => n,Answer()
  same => n,Wait(1)
  ; Play a beep so you know it connected
  same => n,Playback(beep)

  ; Execute your Node script in the background (The '&' is critical so Asterisk doesn't freeze)
  ; Note: Ensure the path to your script is correct here!
  same => n,System(/usr/bin/node /home/vex/voip/news-anchor.js &)

  ; Play built-in Asterisk confirmation sounds so you know to hang up
  same => n,Playback(auth-thankyou)
  same => n,Playback(goodbye)
  same => n,Hangup()


[outbound-playback]
exten => s,1,NoOp(Outbound AI Call Answered)
 same => n,Answer()
 same => n,Wait(1) ; Give the user a second to put the phone to their ear
 same => n,Playback(/data/audio/test_speech)
 same => n,Hangup()
